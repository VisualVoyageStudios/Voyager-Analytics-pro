<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts | Voyager Analytics</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/pgAnime.css">
</head>
<body>
    <!--Loader-->
<div id="loader">
  <div class="spinner"></div>
</div>


<div class="dashboard-container">

    <aside class="sidebar">

        <div class="logo">
            <i class="fas fa-rocket skeleton">Voyager</i>
            <p>ANALYTICS</p>

        </div>
        <nav>
            <a href="dashboard.html">
                <i class="fas fa-tachograph-digital">Dashboard</i>
            </a>

            <a href="accounts.html" class="active">
                <i class="fas fa-briefcase">Accounts</i>
            </a>

            <a href="trades.html">
                <i class="fas fa-chart-line">Trades</i>
            </a>

            <a href="analytics.html">
                <i class="fas fa-eye">Analytics</i>
            </a>

            <a href="economicHP.html">
                <i class="fas fa-globe">Economy Heatmap</i>
            </a>

            <a href="journal.html">
                <i class="fas fa-book-open-reader">Journal</i>
            </a>

            <a href="settings.html">
               <i class="fas fa-gears">Settings</i>
            </a>
        </nav>

    </aside>

    <main class="main-content">
        <div class="page-header">
            <h2>Trading Accounts</h2>

            <button id="connectAccountBtn"
                    class="btn-primary">
                + Connect Account
            </button>

        </div>

        <div class="table-card">

            <table class="skeleton">

                <thead>
                    <tr>
                        <th>Account Name</th>
                        <th>Broker</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="accountsTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!--Account Form-->
<div id="accountModal" class="modal">
    <div class="modal-content">
        <h2>Connect Account</h2>
        <form id="accountForm">
            <input
                type="text"
                id="accountName"
                placeholder="Account Name (e.g. ICMarkets Live)"
                required
            >
            <input
                type="text"
                id="broker"
                placeholder="Broker (e.g. ICMarkets)"
                required
            >
            <button type="submit">
                Connect Account
            </button>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/accounts.js"></script>
<script src="../js/pgAnime.js"></script>
</body>
</html>
