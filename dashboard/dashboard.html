<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyager Analytics Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/pgAnime.css">
</head>
<body>

<div class="dashboard-container">

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-rocket skeleton">Voyager</i>
            <p>ANALYTICS</p>
        </div>

        <nav>
            <a href="dashboard.html" class="active">
                <i class="fas fa-tachograph-digital">Dashboard</i>
            </a>
            <a href="accounts.html">
                <i class="fas fa-briefcase">Accounts</i>
            </a>
            <a href="trades.html">
                <i class="fas fa-chart-line">Trades</i>
            </a>
            <a href="analytics.html">
                <i class="fas fa-eye">Analytics</i>
            </a>
            <a href="economicHP.html">
                <i class="fas fa-globe">Economy Heatmap</i>
            </a>
            <a href="journal.html">
                <i class="fas fa-book-open-reader">Journal</i>
            </a>
            <a href="settings.html">
                <i class="fas fa-gears">Settings</i>
            </a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <h2>Dashboard</h2>
            <div id="userEmail" style="color: var(--muted); font-size: 14px;"></div>
            <button id="logoutBtn">Logout</button>
        </header>

        <div class="dashboard-header">
            <h1>Welcome Back 👋</h1>
        </div>

        <!-- KPI Cards -->
        <div class="dashboard-grid">
            <div class="metric-card skeleton">
                <h3>Total Profit</h3>
                <p id="dashboardProfit">$0</p>
            </div>

            <div class="metric-card skeleton">
                <h3>Win Rate</h3>
                <p id="dashboardWinRate">0%</p>
            </div>

            <div class="metric-card skeleton">
                <h3>Accounts</h3>
                <p id="dashboardAccounts">0</p>
            </div>

            <div class="metric-card skeleton">
                <h3>Total Trades</h3>
                <p id="dashboardTrades">0</p>
            </div>
        </div>

        <!-- Equity Curve -->
        <div class="chart-container">
            <h2>Equity Curve</h2>
            <canvas id="equityChart" class="skeleton"></canvas>
        </div>

        <!-- Recent Trades -->
        <div class="recent-trades">
            <h2>Recent Trades</h2>
            <table class="data-table skeleton">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody id="recentTradesTable"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/api.js"></script>
<script src="../js/dashboard.js"></script>
<script src="../js/pgAnime.js"></script>
</body>
</html>
